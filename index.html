<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>English Library</title>

<link rel="stylesheet"
href="style.css">


<!-- PWA -->

<link rel="manifest"
href="manifest.json">


<meta name="theme-color"
content="#333333">


<!-- iPhone / iPad -->

<meta name="apple-mobile-web-app-capable"
content="yes">

<meta name="apple-mobile-web-app-status-bar-style"
content="default">

<meta name="apple-mobile-web-app-title"
content="English Library">


</head>


<body>

<div class="container">


<h1>
📚 English Library
</h1>


<!-- ========================================
     資料筆數
======================================== -->

<div id="count"></div>


<!-- ========================================
     顯示模式
======================================== -->

<div class="toolbar">

<button onclick="changeShow('en')">
英文
</button>

<button onclick="changeShow('zh')">
中文
</button>

<button onclick="changeShow('both')">
英＋中
</button>

<button onclick="blindMode()">
盲聽
</button>

</div>


<!-- ========================================
     目前句子
======================================== -->

<div id="card">

<div id="english">
Loading...
</div>

<div id="chinese">
</div>

</div>


<!-- ========================================
     上一句 / 播放 / 下一句
======================================== -->

<div class="controls">

<button onclick="previousSentence()">
⬅ 上一句
</button>

<button onclick="speak()">
🔊 播放
</button>

<button onclick="nextSentence()">
下一句 ➡
</button>

</div>


<!-- ========================================
     播放速度
======================================== -->

<div class="speed-control">

<div class="speed-title">
播放速度
</div>


<div class="speed-buttons">


<button
id="speed05"
class="speed-button"
data-rate="0.5"
onclick="setSpeechRate(0.5)">
0.5x
</button>


<button
id="speed07"
class="speed-button active-speed"
data-rate="0.7"
onclick="setSpeechRate(0.7)">
0.7x
</button>


<button
id="speed10"
class="speed-button"
data-rate="1.0"
onclick="setSpeechRate(1.0)">
1.0x
</button>


</div>

</div>


</div>


<script src="app.js"></script>


<!-- ========================================
     PWA Service Worker
======================================== -->

<script>

if (
  "serviceWorker" in navigator
) {

  window.addEventListener(
    "load",
    function () {

      navigator.serviceWorker
        .register("./sw.js")
        .then(
          function (registration) {

            console.log(
              "EnglishLibrary PWA 啟用成功",
              registration.scope
            );

          }
        )
        .catch(
          function (error) {

            console.error(
              "PWA 啟用失敗",
              error
            );

          }
        );

    }
  );

}

</script>


</body>

</html>

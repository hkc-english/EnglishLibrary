<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>English Library</title>

<link rel="stylesheet"
href="style.css">

</head>


<body>

<div class="container">


<h1>
📚 English Library
</h1>


<!-- ========================================
     資料筆數
======================================== -->

<div id="count"></div>


<!-- ========================================
     顯示模式
======================================== -->

<div class="toolbar">

<button
onclick="changeShow('en')">
英文
</button>

<button
onclick="changeShow('zh')">
中文
</button>

<button
onclick="changeShow('both')">
英＋中
</button>

<button
onclick="blindMode()">
盲聽
</button>

</div>


<!-- ========================================
     目前句子
======================================== -->

<div id="card">

<div id="english">
Loading...
</div>

<div id="chinese">
</div>

</div>


<!-- ========================================
     播放控制
======================================== -->

<div class="controls">


<button
onclick="previousSentence()">
⬅ 上一句
</button>


<button
onclick="speak()">
🔊 播放
</button>


<button
onclick="nextSentence()">
下一句 ➡
</button>


</div>


<!-- ========================================
     暫停 / 停止
======================================== -->

<div class="playback-controls">


<button
id="pauseButton"
onclick="togglePause()">
⏸ 暫停
</button>


<button
id="stopButton"
onclick="stopAllPlayback()">
⏹ 停止
</button>


</div>


<!-- ========================================
     播放狀態
======================================== -->

<div
id="playbackStatus">
</div>


<!-- ========================================
     播放速度
======================================== -->

<div class="speed-control">


<div class="speed-title">
播放速度
</div>


<div class="speed-buttons">


<button
class="speed-button"
data-rate="0.5"
onclick="setSpeechRate(0.5)">
0.5x
</button>


<button
class="speed-button"
data-rate="0.7"
onclick="setSpeechRate(0.7)">
0.7x
</button>


<button
class="speed-button"
data-rate="1.0"
onclick="setSpeechRate(1.0)">
1.0x
</button>


</div>

</div>


<!-- ========================================
     連續播放
======================================== -->

<div class="continuous-control">


<button
onclick="startContinuousPlay()">
▶️ 連續播放
</button>


</div>


<!-- ========================================
     隨機播放
======================================== -->

<div class="random-control">


<button
onclick="startRandomPlay()">
🔀 隨機播放
</button>


</div>


<!-- ========================================
     連續播放間隔
======================================== -->

<div class="interval-control">


<div class="interval-title">
句子間隔
</div>


<div class="interval-buttons">


<button
class="interval-button"
data-interval="1000"
onclick="setPlaybackInterval(1000)">
1秒
</button>


<button
class="interval-button"
data-interval="2000"
onclick="setPlaybackInterval(2000)">
2秒
</button>


<button
class="interval-button"
data-interval="3000"
onclick="setPlaybackInterval(3000)">
3秒
</button>


<button
class="interval-button"
data-interval="5000"
onclick="setPlaybackInterval(5000)">
5秒
</button>


</div>

</div>


<!-- ========================================
     新增英文句子
======================================== -->

<div class="add-section">


<button
onclick="showAddForm()">
➕ 新增句子
</button>


<div
id="addForm"
style="display:none;">


<div class="form-title">
新增英文句子
</div>


<input
id="newEnglish"
type="text"
placeholder="請輸入英文句子">


<input
id="newChinese"
type="text"
placeholder="請輸入中文翻譯">


<div class="form-buttons">


<button
onclick="addSentence()">
💾 儲存
</button>


<button
onclick="hideAddForm()">
取消
</button>


</div>


<div
id="addMessage">
</div>


</div>

</div>


</div>


<!-- ========================================
     JavaScript
======================================== -->

<script
src="app.js">
</script>


</body>

</html>

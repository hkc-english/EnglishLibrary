<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>English Library</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>
📚 English Library
</h1>


<div id="count"></div>


<!-- 顯示模式 -->

<div class="toolbar">

<button onclick="changeShow('en')">
英文
</button>

<button onclick="changeShow('zh')">
中文
</button>

<button onclick="changeShow('both')">
英＋中
</button>

<button onclick="blindMode()">
盲聽
</button>

</div>


<!-- 目前句子 -->

<div id="card">

<div id="english">
Loading...
</div>

<div id="chinese">
</div>

</div>


<!-- 操作按鈕 -->

<div class="controls">

<button onclick="previousSentence()">
⬅ 上一句
</button>

<button onclick="speak()">
🔊 播放
</button>

<button onclick="nextSentence()">
下一句 ➡
</button>

</div>


<!-- 播放速度 -->

<div class="speed-control">

<div class="speed-title">
播放速度
</div>


<div class="speed-buttons">

<button onclick="setSpeechRate(0.5)">
0.5x
</button>

<button onclick="setSpeechRate(0.7)">
0.7x
</button>

<button onclick="setSpeechRate(1.0)">
1.0x
</button>

</div>

</div>


</div>


<script src="app.js"></script>

</body>

</html>

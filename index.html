<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>English Library</title>

<link rel="stylesheet"
href="style.css">

</head>


<body>

<div class="container">


<h1>
📚 English Library
</h1>


<!-- ========================================
     資料筆數
======================================== -->

<div id="count">
</div>


<!-- ========================================
     顯示模式
======================================== -->

<div class="toolbar">

<button
type="button"
onclick="changeShow('en')">
英文
</button>


<button
type="button"
onclick="changeShow('zh')">
中文
</button>


<button
type="button"
onclick="changeShow('both')">
英＋中
</button>


<button
type="button"
onclick="blindMode()">
盲聽
</button>

</div>


<!-- ========================================
     目前句子
======================================== -->

<div id="card">

<div id="english">
Loading...
</div>


<div id="chinese">
</div>

</div>


<!-- ========================================
     上一句 / 播放 / 下一句
======================================== -->

<div class="controls">


<button
type="button"
onclick="previousSentence()">
⬅ 上一句
</button>


<button
type="button"
onclick="speak()">
🔊 播放
</button>


<button
type="button"
onclick="nextSentence()">
下一句 ➡
</button>


</div>


<!-- ========================================
     連續播放 / 停止 / 隨機播放
======================================== -->

<div class="playback-controls">


<button
id="continuousButton"
type="button"
onclick="startContinuousPlay()">
▶️ 連續播放
</button>


<button
id="stopButton"
type="button"
onclick="stopContinuousPlay()">
⏹️ 停止
</button>


<button
id="randomButton"
type="button"
onclick="startRandomPlay()">
🔀 隨機播放
</button>


</div>


<!-- ========================================
     播放狀態
======================================== -->

<div id="playbackStatus">
</div>


<!-- ========================================
     播放速度
======================================== -->

<div class="speed-control">


<div class="speed-title">
播放速度
</div>


<div class="speed-buttons">


<button
class="speed-button"
id="speed05"
data-rate="0.5"
type="button"
onclick="setSpeechRate(0.5)">
0.5x
</button>


<button
class="speed-button"
id="speed07"
data-rate="0.7"
type="button"
onclick="setSpeechRate(0.7)">
0.7x
</button>


<button
class="speed-button"
id="speed10"
data-rate="1.0"
type="button"
onclick="setSpeechRate(1.0)">
1.0x
</button>


</div>

</div>


</div>


<script src="app.js"></script>


</body>

</html>
